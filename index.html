     dokumenteras i HANDOVER.md: vendor-bibliotek -> data -> api -> lib -> app. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3B6D11" />
    <link rel="manifest" href="manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="IIO - Is It Open" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <title>IIO - Is It Open</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="brand-row">
        <img src="favicon.svg" alt="" class="brand-mark" aria-hidden="true" />
        <span class="brand-name">IIO</span>
        <select class="lang-select" id="langSelect" aria-label="Language"></select>
        <button class="icon-button" id="refreshBtn" type="button">
          <span class="icon" id="refreshIcon" aria-hidden="true"></span>
        </button>
      </div>
      <div class="location-row">
        <span class="icon" id="locationIcon" aria-hidden="true"></span>
        <span class="location-text" id="locationText"></span>
      </div>

      <div class="chip-row-wrapper">
        <div class="chip-row" id="chipRow"></div>
        <div class="chip-row-fade" id="chipRowFade" aria-hidden="true"></div>
      </div>

      <div class="list-meta-row">
        <span class="list-category" id="listCategory"></span>
        <button class="toggle-closed-btn" id="toggleClosedBtn" type="button" aria-pressed="false">
          <span class="icon" id="toggleIcon" aria-hidden="true"></span>
          <span id="toggleLabel"></span>
        </button>
      </div>

      <div id="content" aria-live="polite"></div>
    </div>

    <script src="lib/vendor/opening_hours.min.js"></script>
    <script src="data/categories.js"></script>
    <script src="data/i18n.js"></script>
    <script src="api/overpassClient.js"></script>
    <script src="lib/openingHours.js"></script>
    <script src="lib/icons.js"></script>
    <script src="app.js"></script>
  </body>
</html>
