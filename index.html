<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Öppet nu</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="header-row">
        <span class="icon" id="locationIcon" aria-hidden="true"></span>
        <span class="location-text" id="locationText"></span>
        <select class="lang-select" id="langSelect" aria-label="Language"></select>
        <button class="icon-button" id="refreshBtn" type="button">
          <span class="icon" id="refreshIcon" aria-hidden="true"></span>
        </button>
      </div>

      <div class="chip-row" id="chipRow"></div>

      <div class="toggle-row">
        <button class="toggle-closed-btn" id="toggleClosedBtn" type="button" aria-pressed="false">
          <span class="icon" id="toggleIcon" aria-hidden="true"></span>
          <span id="toggleLabel"></span>
        </button>
      </div>

      <div id="content" aria-live="polite"></div>
    </div>

    <script src="lib/vendor/opening_hours.min.js"></script>
    <script src="data/categories.js"></script>
    <script src="data/i18n.js"></script>
    <script src="api/overpassClient.js"></script>
    <script src="lib/openingHours.js"></script>
    <script src="lib/icons.js"></script>
    <script src="app.js"></script>
  </body>
</html>
